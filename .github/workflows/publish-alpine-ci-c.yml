name: 'Publish - Alpine - CI-C'



on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/publish-alpine-ci-c'
      - 'dockerfiles/alpine-ci-c'

  push:
    branches:
      - master
    paths:
      - '.github/workflows/publish-alpine-ci-c'
      - 'dockerfiles/alpine-ci-c'

  workflow_dispatch:



jobs:
  publish-alpine-c:



    strategy:
      matrix:
        base_image_tag:
          - '3.21'
          - '3.22'
          - '3.23'

        include:
          - base_image_tag: '3.21'
            publish_repotags: |
              ciready/alpine:3.21-ci-c

          - base_image_tag: '3.22'
            publish_repotags: |
              ciready/alpine:3.22-ci-c

          - base_image_tag: '3.23'
            publish_repotags: |
              ciready/alpine:3.23-ci-c



    name: 'Publish - alpine:${{matrix.base_image_tag}}'
    runs-on: ubuntu-latest
    steps:


      - name: 'Check out the code'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3


      - name: 'Login to DockerHub'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: 'Build and push'
        uses: docker/build-push-action@v6
        with:
          build-args: |
            base_image_tag=${{matrix.base_image_tag}}
          context: .
          file: ./dockerfiles/alpine-ci-c
          platforms: linux/amd64
          push: true
          tags: ${{ matrix.publish_repotags }}
