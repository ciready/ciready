name: 'Publish - CentOS - C'



on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/publish-centos-ci-c'
      - 'dockerfiles/centos-ci-c'

  push:
    branches:
      - master
    paths:
      - '.github/workflows/publish-centos-ci-c'
      - 'dockerfiles/centos-ci-c'

  workflow_dispatch:



jobs:
  publish-centos-c:



    strategy:
      matrix:
        base_image_tag:
          - 'stream9'
          - 'stream10'

        include:
          - base_image_tag: 'stream9'
            publish_repotags: |
              ciready/centos:stream-9-ci-c

          - base_image_tag: 'stream10'
            publish_repotags: |
              ciready/centos:stream-10-ci-c



    name: 'Publish - centos:${{matrix.base_image_tag}}'
    runs-on: ubuntu-latest
    steps:


      - name: 'Check out the code'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3


      - name: 'Login to DockerHub'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: 'Build and push'
        uses: docker/build-push-action@v6
        with:
          build-args: |
            base_image_tag=${{matrix.base_image_tag}}
          context: .
          file: ./dockerfiles/centos-ci-c
          platforms: linux/amd64
          push: true
          tags: ${{ matrix.publish_repotags }}
