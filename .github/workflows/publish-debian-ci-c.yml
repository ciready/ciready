name: 'Publish - Debian - C'



on:
  pull_request:
    branches:
      - master
    paths:
      - '.github/workflows/publish-debian-ci-c'
      - 'Dockerfile-debian-ci-c'

  push:
    branches:
      - master
    paths:
      - '.github/workflows/publish-debian-ci-c'
      - 'Dockerfile-debian-ci-c'

  schedule:
    - cron: '13 5 * * 0'

  workflow_dispatch:



jobs:
  publish-debian-c:



    strategy:
      matrix:
        base_image_tag:
          - 'bullseye'
          - 'bookworm'
          - 'trixie'
          - 'sid'

        include:
          - base_image_tag: 'bullseye'
            publish_repotags: |
              ciready/debian:bullseye-ci-c
              ciready/debian:11-ci-c

          - base_image_tag: 'bookworm'
            publish_repotags: |
              ciready/debian:bookworm-ci-c
              ciready/debian:12-ci-c

          - base_image_tag: 'trixie'
            publish_repotags: |
              ciready/debian:trixie-ci-c
              ciready/debian:13-ci-c

          - base_image_tag: 'sid'
            publish_repotags: |
              ciready/debian:sid-ci-c



    name: 'Publish - debian:${{matrix.base_image_tag}}'
    runs-on: ubuntu-latest
    steps:


      - name: 'Check out the code'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0


      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3


      - name: 'Login to DockerHub'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}


      - name: 'Build and push'
        uses: docker/build-push-action@v6
        with:
          build-args: |
            base_image_tag=${{matrix.base_image_tag}}
          context: .
          file: ./Dockerfile-debian-ci-c
          platforms: linux/amd64
          push: true
          tags: ${{ matrix.publish_repotags }}
